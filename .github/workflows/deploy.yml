name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/mi.zur-i.com
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            sudo rsync -a --delete \
              --exclude='.git*' \
              --exclude='*.md' \
              --exclude='data/' \
              ./ /var/www/mi.zur-i.com/
            sudo chown -R www-data:www-data /var/www/mi.zur-i.com
            sudo chown -R "$USER":"$USER" /var/www/mi.zur-i.com/data 2>/dev/null || true
