<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>mi.zur-i | tech</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="tech portfolio — projects, fetched from github"
    />
    <meta name="author" content="Michał Żurawski" />
    <link rel="stylesheet" href="https://use.typekit.net/lgc5ifx.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Caveat&family=Lobster&family=Monoton&family=Orbitron:wght@700&family=Permanent+Marker&family=Playfair+Display:ital@1&family=Press+Start+2P&family=Rubik+Mono+One&display=swap"
      rel="stylesheet"
    />
    <link href="assets/fontawesome/css/fontawesome.css" rel="stylesheet" />
    <link href="assets/fontawesome/css/solid.css" rel="stylesheet" />
    <link href="assets/fontawesome/css/regular.css" rel="stylesheet" />
    <link href="assets/fontawesome/css/brands.css" rel="stylesheet" />
    <style>
      /* ── TOKENS (mirrors index.html) ─────────────────────── */
      :root {
        font-size: 17px;
        font-family: monospace;
        --font-primary: "birch-std", monospace;
        --text-primary: #722a1f;
        --text-secondary: #0d9898;
        --bg-primary: #c7c7c7;
        --bg-secondary: #732a1f;
        --bg-dark: #1c1c1c;
        --bg-light: #c7c7c7;
        --menu-side-space: calc(1rem + 1vw);
        --nav-width: 4rem;
        --nav-right: calc(1rem + var(--menu-side-space) + 1vw - 2rem);
        --content-mr: calc(var(--nav-right) + var(--nav-width) + 3rem);
        --content-ml: calc(var(--menu-side-space) + 2vw + 1rem);
        --header-h: 8rem;
      }

      * {
        margin: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        background-color: var(--text-primary);
      }

      body {
        color: var(--text-primary);
        background-color: var(--bg-primary);
        padding: 1rem 1rem 0;
        -ms-overflow-style: none;
        scrollbar-width: none;
        visibility: hidden;
        position: relative;
        min-height: 100vh;
      }
      body.fonts-loaded {
        visibility: visible;
      }
      /* Navbar halo — separate fixed element so it can sit at a z-index BELOW
         the header (60) and connector (9998), but still ABOVE page sections.
         Result: full 4-direction halo around the navbar, but header content
         and the connector strips above/below the navbar render on top of it. */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        right: 0;
        margin-top: calc(var(--header-h) - 0.2rem);
        margin-right: calc(var(--nav-right) - 0.2rem);
        width: calc(var(--nav-width) + 0.4rem);
        height: calc(100vh - var(--header-h) - 5rem + 0.4rem);
        background-color: var(--bg-primary);
        z-index: 50;
        pointer-events: none;
        transition: width 0.1s ease;
      }
      /* Expands in lockstep with the navbar's own width transition on hover. */
      body:has(.navbar:hover)::before {
        width: calc(12rem + 0.4rem);
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
      }
      a {
        color: var(--text-primary);
        text-decoration: none;
      }

      /* ── HEADER ──────────────────────────────────────────── */
      header {
        height: var(--header-h);
        padding-left: var(--menu-side-space);
        padding-right: var(--menu-side-space);
        display: flex;
        align-items: center;
        --logo-font-size: calc(4rem + 1vw);
        /* Lifted above the navbar halo (z-index: 50) so the halo's upward
           extension can't paint over header content. Still below the navbar (9999). */
        position: relative;
        z-index: 60;
      }
      header .logo p {
        font-family: var(--font-primary);
        font-weight: normal;
        font-size: var(--logo-font-size);
        text-align: center;
      }
      header .left {
        flex: 10;
        margin-right: calc(var(--logo-font-size) / 5);
      }
      header .logo {
        flex: 1;
      }
      header .right {
        flex: 2;
        margin-left: calc(var(--logo-font-size) / 5);
        margin-right: 1vw;
      }

      .horizontal-line {
        border-bottom: 3px solid;
        display: block;
      }
      .vertical-line {
        border-left: 3px solid;
        display: block;
      }

      /* ── CONNECTOR ───────────────────────────────────────── */
      .menu-connector {
        /*height: 600vh;*/
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        margin-top: 5rem;
        margin-bottom: 2.5rem;
        /* -1.5px: the line is rendered as `border-left`, so its visual center
           sits half the border width to the left of the box's right edge. */
        margin-right: calc(1rem + var(--menu-side-space) + 1vw - 1.5px);
        z-index: 9998;
      }

      /* ── NAVBAR ──────────────────────────────────────────── */
      .navbar {
        position: fixed;
        right: 0;
        top: 0;
        margin-top: var(--header-h);
        margin-right: calc(var(--nav-right));
        background-color: var(--bg-primary);
        border: 2px solid;
        /*border-image: linear-gradient(
            to bottom,
            var(--bg-secondary),
            var(--bg-primary),
            var(--bg-primary),
            var(--bg-secondary)
          )
          1;*/
        z-index: 9999;
        width: var(--nav-width);
        overflow: hidden;
        transition: width 0.1s ease;
      }
      .navbar:hover {
        width: 12rem;
      }
      .navbar:hover .link-text {
        display: block;
      }

      .navbar-nav {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100%;
      }
      .nav-item {
        width: 100%;
      }
      .nav-item:last-child {
        margin-top: auto;
      }

      .nav-link {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        height: 4rem;
        font-size: 2rem;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
      }
      .nav-link:hover {
        color: var(--text-secondary);
      }

      .nav-link i.fa {
        /* Match navbar's content area (--nav-width minus 2x 2px border) so the
           glyph centers on the navbar's geometric axis instead of 2px right of it. */
        width: calc(var(--nav-width) - 4px);
        text-align: center;
        flex-shrink: 0;
        position: relative;
      }
      /* Active-section indicator: a smaller copy of the same FontAwesome solid
         heart (\f004) in the background color, centered over the larger heart. */
      .nav-link.active i.fa::after {
        content: "\f004";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        font-size: 0.9rem;
        line-height: 1;
        color: var(--bg-primary);
        pointer-events: none;
      }

      .link-text {
        font-size: 1.2rem;
        display: none;
        margin-left: 0;
      }

      /* ── MAIN ────────────────────────────────────────────── */
      main {
        margin: 0 var(--content-mr) 0 var(--content-ml);
        padding: 0;
        padding-bottom: 6rem;
      }

      /* ── PAGE INTRO ──────────────────────────────────────── */
      .page-intro {
        padding-top: 0.2rem;
        padding-bottom: 0.4rem;
      }
      .page-eyebrow {
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: lowercase;
        opacity: 0.65;
        margin-bottom: 0.15rem;
      }
      .page-title {
        font-family: var(--font-primary);
        font-weight: normal;
        font-size: clamp(3rem, 6vw, 5rem);
        line-height: 0.9;
        letter-spacing: -0.02em;
      }
      .page-subtitle {
        font-size: 0.82rem;
        line-height: 1.35;
        margin-top: 0.25rem;
        max-width: 36rem;
        opacity: 0.85;
      }
      .page-soft {
        display: block;
        opacity: 0.55;
        font-size: 0.7rem;
        margin-top: 0.1rem;
      }

      /* ── FILTER BAR ──────────────────────────────────────── */
      .filter-bar {
        margin: 1rem 0 0;
        padding: 0.9rem 0;
        border-top: 2px solid;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .filter-label {
        font-size: 0.75rem;
        letter-spacing: 0.25em;
        text-transform: lowercase;
        opacity: 0.65;
        margin-right: 0.5rem;
      }
      .filter-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .filter-tag {
        border: 2px solid;
        background: transparent;
        color: inherit;
        padding: 0.25rem 0.8rem;
        font-size: 0.8rem;
        font-family: monospace;
        letter-spacing: 0.05em;
        cursor: pointer;
      }
      .filter-tag:hover {
        color: var(--text-secondary);
      }
      .filter-tag.active {
        background: var(--text-primary);
        color: var(--bg-primary);
      }

      /* ── PROJECTS LIST ───────────────────────────────────── */
      .projects-status {
        padding: 2rem 0;
        font-size: 0.9rem;
        opacity: 0.7;
      }
      .projects-status .small {
        font-size: 0.75rem;
        opacity: 0.7;
        margin-top: 0.4rem;
      }

      .projects-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .project-card {
        display: grid;
        grid-template-columns: 1fr 0.45fr;
        gap: clamp(1rem, 2.5vw, 2rem);
        padding: 0.7rem 0;
        border-bottom: 2px solid;
        align-items: center;
      }
      .project-card:first-child {
        border-top: 2px solid;
      }

      .project-card.hidden {
        display: none;
      }

      .project-text {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        min-width: 0;
      }

      .project-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }
      .project-tag {
        border: 2px solid;
        padding: 0.18rem 0.65rem;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: lowercase;
      }
      .project-updated {
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        text-transform: lowercase;
        opacity: 0.6;
      }

      .project-name {
        font-family: var(--font-primary);
        font-weight: normal;
        font-size: clamp(2rem, 4.5vw, 3.4rem);
        line-height: 0.95;
        letter-spacing: -0.02em;
        word-break: break-word;
      }

      .project-description {
        font-size: 0.82rem;
        line-height: 1.35;
        max-width: 36rem;
        opacity: 0.9;
      }
      .project-description.muted {
        opacity: 0.55;
        font-style: italic;
      }

      .project-links {
        display: flex;
        flex-wrap: wrap;
        gap: 1.2rem 1.6rem;
        margin-top: 0.4rem;
      }
      .project-link {
        font-size: 0.85rem;
        letter-spacing: 0.1em;
        text-transform: lowercase;
        border-bottom: 2px solid;
        padding-bottom: 0.1rem;
      }
      .project-link:hover {
        color: var(--text-secondary);
      }
      .project-link i.fa {
        margin-right: 0.4rem;
        font-size: 0.95em;
      }

      .project-image-wrap {
        position: relative;
        aspect-ratio: 16 / 8.7;
        overflow: hidden;
        border: 2px solid;
        background: rgba(114, 42, 31, 0.06);
      }
      .project-image-wrap.empty {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        letter-spacing: 0.25em;
        text-transform: lowercase;
        opacity: 0.45;
      }
      .project-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;

        filter: grayscale(40%) contrast(0.75);
        position: relative;
      }

      /* Forces every output pixel onto the red ray (a·L, b·L, c·L), so
         highlights can't drift into yellow the way a sepia+hue-rotate
         ramp does. The matrix is defined inline below in <svg>. */
      body.dark-mode .project-image {
        filter: url(#red-duotone) brightness(0.55) contrast(0.8);
      }

      .project-image-link:hover {
        opacity: 0.75;
        color: var(--text-secondary);
      }

      /* ── RESPONSIVE ──────────────────────────────────────── */
      @media (max-width: 699px) {
        /* Halo's geometry is tied to the desktop navbar (right side, tall);
           mobile navbar is bottom-anchored and full-width, so the halo isn't
           meaningful there and would otherwise sit stuck on the right edge. */
        body::before {
          display: none;
        }
        /* Reserve clearance below the page so the fixed bottom navbar
           can't occlude the last section.
           margin (not padding) so the gap doesn't paint with body's bg —
           html's --text-primary background shows through instead. */
        body {
          padding-bottom: 3rem;
        }
        header .right {
          margin-right: 0;
        }
        .menu-connector {
          display: none;
        }

        .navbar {
          bottom: 0;
          top: auto;
          width: 100vw !important;
          height: 3rem;
          margin: 0;
          border-width: 2px 0 0;
          border-color: var(--bg-secondary);
        }
        .navbar-nav {
          flex-direction: row;
          height: 3rem;
        }
        .nav-item:last-child {
          margin-top: 0;
        }
        .nav-link {
          justify-content: center;
          height: 3rem;
          font-size: 1.5rem;
        }
        .link-text {
          display: none !important;
        }

        main {
          margin-left: 0;
          margin-right: 0;
        }
        .page-title {
          font-size: clamp(3rem, 14vw, 5rem);
        }

        .project-card {
          grid-template-columns: 1fr;
          gap: 1.4rem;
        }
        .project-image-wrap {
          order: -1;
          aspect-ratio: 16 / 9;
        }
      }

      @media only screen and (min-width: 700px) {
        .navbar {
          top: 0;
          width: 4rem;
          height: calc(100vh - var(--header-h) - 5rem);
        }
        .navbar:hover {
          width: 12rem;
        }
        .navbar:hover .link-text {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <!-- SVG FILTER: red-only duotone for dark-mode project images.
         Each output channel = (per-channel weight) × luminance, so every
         pixel lands on a single red ray. No yellow possible. -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <filter id="red-duotone" color-interpolation-filters="sRGB">
        <feColorMatrix
          type="matrix"
          values="0.269 0.528 0.103 0 0
                  0.054 0.106 0.020 0 0
                  0.036 0.070 0.014 0 0
                  0     0     0     1 0"
        />
      </filter>
    </svg>

    <!-- HEADER -->
    <header id="top">
      <span class="horizontal-line left"></span>
      <div class="logo">
        <p><a href="/">mi.zur&#8209;i</a></p>
      </div>
      <span class="horizontal-line right"></span>
    </header>

    <!-- CONNECTOR -->
    <div class="vertical-line menu-connector"></div>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a href="/" class="nav-link">
            <i class="fa fa-solid fa-arrow-left"></i>
            <span class="link-text">home</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" onclick="toggleStyle()">
            <i class="fa fa-solid fa-yin-yang"></i>
            <span class="link-text" id="dark-mode-label">night-mode</span>
          </a>
        </li>
      </ul>
    </nav>

    <main>
      <section class="page-intro">
        <p class="page-eyebrow">portfolio</p>
        <h1 class="page-title">tech</h1>
        <p class="page-subtitle">
          projects, research &amp; side-quests
          <span class="page-soft"
            >fetched from github · sorted by recent updates</span
          >
        </p>
      </section>

      <section class="filter-bar" aria-label="filter projects by tag">
        <span class="filter-label">filter:</span>
        <div class="filter-tags" id="filter-tags">
          <button class="filter-tag active" data-tag="__all__">all</button>
        </div>
      </section>

      <div class="projects-status" id="projects-status">
        loading projects from github...
      </div>

      <section
        class="projects-list"
        id="projects-list"
        aria-live="polite"
      ></section>
    </main>

    <script>
      document.fonts.ready.then(() =>
        document.body.classList.add("fonts-loaded"),
      );

      /* ── DARK MODE (same logic as index.html) ─────────────── */
      (function () {
        if (localStorage.getItem("dark-mode") === "1") darkModeOn(true);
      })();

      function toggleStyle() {
        if (localStorage.getItem("dark-mode") === "1") darkModeOff();
        else darkModeOn(false);
      }

      function darkModeOn(silent) {
        document.documentElement.style.setProperty("--bg-primary", "#1c1c1c");
        document.body.classList.add("dark-mode");
        document.getElementById("dark-mode-label").textContent = "light-mode";
        document.getElementById("navbar").style.backgroundColor = "#1c1c1c";
        localStorage.setItem("dark-mode", "1");
      }

      function darkModeOff() {
        document.documentElement.style.setProperty("--bg-primary", "#c7c7c7");
        document.body.classList.remove("dark-mode");
        document.getElementById("dark-mode-label").textContent = "night-mode";
        document.getElementById("navbar").style.backgroundColor = "#c7c7c7";
        localStorage.setItem("dark-mode", "0");
      }

      /* ── GITHUB PROJECTS ──────────────────────────────────── */
      // Server-side cron writes the snapshot to this path once per hour.
      // See scripts/fetch-projects.mjs.
      const PROJECTS_URL = "/data/projects.json";

      function timeAgo(iso) {
        const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
        if (sec < 60) return "just now";
        const min = Math.floor(sec / 60);
        if (min < 60) return `${min}m ago`;
        const hr = Math.floor(min / 60);
        if (hr < 24) return `${hr}h ago`;
        const d = Math.floor(hr / 24);
        if (d < 30) return `${d}d ago`;
        const mo = Math.floor(d / 30);
        if (mo < 12) return `${mo}mo ago`;
        const y = Math.floor(d / 365);
        return `${y}y ago`;
      }

      function escapeHtml(s) {
        return String(s ?? "").replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }

      function normalizeLanguageTag(lang) {
        const value = String(lang || "");
        const normalized = value.toLowerCase();
        if (
          normalized === "cmake" ||
          normalized === "dockerfile" ||
          normalized === "makefile" ||
          normalized === "objective-c"
        ) {
          return "other";
        }
        return value;
      }

      function repoTags(repo) {
        if (Array.isArray(repo.languages) && repo.languages.length > 0) {
          return [...new Set(repo.languages.map(normalizeLanguageTag))];
        }
        return [normalizeLanguageTag(repo.language || "other")];
      }

      const MY_USERNAME = "mi-zuri";

      function renderCard(repo, image) {
        const tags = repoTags(repo);
        const tagBadges = tags
          .map((t) => `<span class="project-tag">${escapeHtml(t)}</span>`)
          .join("");
        const homepage =
          repo.homepage && /^https?:\/\//i.test(repo.homepage)
            ? repo.homepage
            : null;

        const owner = repo.full_name?.split("/")[0];

        const isMine = owner?.toLowerCase() === MY_USERNAME.toLowerCase();

        const displayName = isMine ? repo.name : repo.full_name || repo.name;
        const imageHref = homepage || repo.html_url;
        const imageBlock = image
          ? `<a class="project-image-link" href="${escapeHtml(imageHref)}" target="_blank" rel="noopener" aria-label="${escapeHtml(displayName)} ${homepage ? "demo" : "repository"}">
               <div class="project-image-wrap">
                 <img class="project-image" src="${escapeHtml(image)}"
                      alt="${escapeHtml(displayName)} preview"
                      loading="lazy"
                      onerror="this.parentElement.classList.add('empty');this.parentElement.textContent='no preview';"/>
               </div>
             </a>`
          : `<a class="project-image-link" href="${escapeHtml(imageHref)}" target="_blank" rel="noopener" aria-label="${escapeHtml(displayName)} ${homepage ? "demo" : "repository"}">
               <div class="project-image-wrap empty">no preview</div>
             </a>`;

        const description = repo.description
          ? `<p class="project-description">${escapeHtml(repo.description)}</p>`
          : `<p class="project-description muted">no description</p>`;

        const demoLink = homepage
          ? `<a class="project-link" href="${escapeHtml(homepage)}" target="_blank" rel="noopener">
               <i class="fa fa-solid fa-arrow-up-right-from-square"></i>demo
             </a>`
          : "";

        return `
          <article class="project-card" data-tags="${escapeHtml(JSON.stringify(tags))}">
            <div class="project-text">
              <div class="project-meta">
                ${tagBadges}
                <span class="project-updated">updated ${escapeHtml(timeAgo(repo.updated_at))}</span>
              </div>
              <h2 class="project-name">${escapeHtml(displayName)}</h2>
              ${description}
              <div class="project-links">
                <a class="project-link" href="${escapeHtml(repo.html_url)}" target="_blank" rel="noopener">
                  <i class="fa fa-brands fa-github"></i>github
                </a>
                ${demoLink}
              </div>
            </div>
            ${imageBlock}
          </article>
        `;
      }

      // Groups of languages that share a single filter button. The key is the
      // label shown on the button; the value is the set of languages that
      // satisfy it. Members are matched against the underlying per-card tags.
      const FILTER_GROUPS = {
        "C / C++": ["C", "C++"],
        "JavaScript / TypeScript": ["JavaScript", "TypeScript"],
        "CSS / HTML": ["CSS", "HTML"],
        "Java / Kotlin": ["Java", "Kotlin"],
        Python: ["Python", "Jupyter Notebook"],
      };

      function groupForLanguage(lang) {
        for (const [label, members] of Object.entries(FILTER_GROUPS)) {
          if (members.includes(lang)) return label;
        }
        return lang;
      }

      function renderFilterTags(tags) {
        const container = document.getElementById("filter-tags");
        const grouped = new Set([...tags].map(groupForLanguage));
        const sorted = [...grouped].sort((a, b) => {
          if (a === "other" && b !== "other") return 1;
          if (b === "other" && a !== "other") return -1;
          return a.localeCompare(b);
        });
        const allBtn = `<button class="filter-tag active" data-tag="__all__">all</button>`;
        const tagBtns = sorted
          .map(
            (t) =>
              `<button class="filter-tag" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</button>`,
          )
          .join("");
        container.innerHTML = allBtn + tagBtns;
        container.querySelectorAll(".filter-tag").forEach((btn) => {
          btn.addEventListener("click", () => {
            container
              .querySelectorAll(".filter-tag")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            applyFilter(btn.dataset.tag);
          });
        });
      }

      function applyFilter(tag) {
        const members = FILTER_GROUPS[tag] || [tag];
        document.querySelectorAll(".project-card").forEach((card) => {
          let cardTags = [];
          try {
            cardTags = JSON.parse(card.dataset.tags || "[]");
          } catch {}
          const matches = cardTags.some((t) => members.includes(t));
          card.classList.toggle("hidden", tag !== "__all__" && !matches);
        });
      }

      function renderProjects(repos, images) {
        const list = document.getElementById("projects-list");
        const tags = new Set();
        repos.forEach((r) => repoTags(r).forEach((t) => tags.add(t)));
        renderFilterTags(tags);
        list.innerHTML = repos
          .map((r, i) => renderCard(r, images[i] || null))
          .join("");
      }

      async function loadProjects() {
        const status = document.getElementById("projects-status");

        let payload;
        try {
          const res = await fetch(PROJECTS_URL, { cache: "no-cache" });
          if (!res.ok) throw new Error(`server responded with ${res.status}`);
          payload = await res.json();
        } catch (err) {
          status.innerHTML = `couldn't load projects.<div class="small">${escapeHtml(err.message)}</div>`;
          return;
        }

        if (!payload.repos || payload.repos.length === 0) {
          status.textContent = "no projects yet ^.^";
          return;
        }

        status.remove();
        renderProjects(payload.repos, payload.images || []);
      }

      loadProjects();
    </script>
  </body>
</html>
